name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and docs dependencies
        run: pip install -e ".[docs]"

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/configure-pages@v5

      - name: Build API reference
        run: |
          cd docs
          if grep -q '^quartodoc:' _quarto.yml; then
            quartodoc build
          else
            echo "No quartodoc section; skipping API reference generation."
          fi

      - name: Render site
        run: cd docs && QUARTO_PYTHON="$(command -v python)" quarto render

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
