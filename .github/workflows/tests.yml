name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests weekly to catch issues with dependencies
    - cron: '0 0 * * 0'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Aligned to pyproject requires-python = ">=3.10". 3.8/3.9 were
        # below the floor and their jobs were broken-by-design.
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[dev]"
    
    - name: Run linting
      shell: bash
      run: |
        changed_py="$(git diff --name-only --diff-filter=ACMR HEAD^ HEAD -- '*.py')"
        if [ -n "$changed_py" ]; then
          black --check $changed_py
          flake8 $changed_py --max-line-length=88 --extend-ignore=E203,W503
        else
          echo "No changed Python files to lint."
        fi
    
    - name: Run type checking
      run: |
        mypy src/neuroim --ignore-missing-imports
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=src/neuroim --cov-report=xml --cov-report=term
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-minimal-deps:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        # Minimum supported version (pyproject requires-python = ">=3.10").
        python-version: '3.10'

    - name: Install minimal dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e . --no-deps
        pip install numpy scipy  # Install only required deps
        pip install pytest
    
    - name: Run core tests
      run: |
        pytest -o addopts='' tests/test_phase1_core.py tests/test_phase2_neurovol_core.py -v

  test-notebooks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install jupyter nbconvert
    
    - name: Test Jupyter notebooks
      run: |
        # Convert and run notebooks
        for notebook in docs/source/tutorials/*.ipynb; do
          if [ -f "$notebook" ]; then
            jupyter nbconvert --to notebook --execute "$notebook" --output=/tmp/executed_notebook.ipynb
          fi
        done
