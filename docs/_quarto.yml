project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "tutorials/*.qmd"
    - "reference/*.qmd"
  preview:
    port: 4200
    browser: false
  resources:
    - "reference/**"

website:
  title: "neuroim"
  description: "Python data structures and algorithms for 3D, 4D, and 5D+ neuroimaging data."
  site-url: "https://bbuchsbaum.github.io/neuroim-python/"
  repo-url: "https://github.com/bbuchsbaum/neuroim-python"
  repo-actions: [edit, issue]
  repo-branch: main
  page-navigation: true
  back-to-top-navigation: true
  bread-crumbs: false
  reader-mode: false
  search:
    location: navbar
    type: overlay
    copy-button: true
  navbar:
    pinned: true
    logo: ""
    left:
      - text: "Get started"
        href: get-started.qmd
      - text: "Tutorials"
        href: tutorials/index.qmd
      - text: "Reference"
        href: reference/index.qmd
    right:
      - icon: github
        href: "https://github.com/bbuchsbaum/neuroim-python"
        aria-label: GitHub
  sidebar:
    - id: tutorials
      title: "Tutorials"
      style: floating
      align: left
      contents:
        - tutorials/index.qmd
        - auto: tutorials/*.qmd
    - id: reference
      title: "Reference"
      style: floating
      contents:
        - reference/index.qmd
        - auto: reference/*.qmd
  page-footer:
    border: false
    left: "Copyright 2026 Brad Buchsbaum"
    right:
      - icon: github
        href: "https://github.com/bbuchsbaum/neuroim-python"

format:
  html:
    theme:
      light: [cosmo, _variables.scss]
      dark: [darkly, _variables.scss, _variables-dark.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "On this page"
    number-sections: false
    anchor-sections: true
    code-copy: true
    code-overflow: wrap
    code-link: true
    code-annotations: hover
    highlight-style:
      light: github
      dark: github-dark
    fig-align: center
    fig-cap-location: bottom
    fig-format: retina
    fig-dpi: 200
    smooth-scroll: true
    link-external-icon: false
    link-external-newwindow: true
    citations-hover: true
    footnotes-hover: true
    grid:
      sidebar-width: 240px
      body-width: 760px
      margin-width: 260px
      gutter-width: 1.5rem

execute:
  freeze: auto
  cache: true
  warning: false
  message: false

metadata-files:
  - _quartodoc.yml

quartodoc:
  package: neuroim
  style: pkgdown
  dir: reference
  title: "API reference"
  render_interlinks: true
  options:
    include_inherited: false
  sidebar: reference/_sidebar.yml
  sections:
    - title: "Core data structures"
      desc: "Spatial metadata, volumes, vectors, and hypervectors."
      contents:
        - NeuroSpace
        - DenseNeuroVol
        - SparseNeuroVol
        - LogicalNeuroVol
        - DenseNeuroVec
        - SparseNeuroVec
        - DenseNeuroHyperVec
        - SparseNeuroHyperVec
    - title: "Constructors and I/O"
      desc: "Create neuroim objects and read or write common image formats."
      contents:
        - neurospace
        - neurovol
        - neurovec
        - read_vol
        - write_vol
        - read_vec
        - write_vec
    - title: "Spatial operations"
      desc: "Filtering, resampling, orientation, ROIs, and connected components."
      contents:
        - gaussian_blur
        - bilateral_filter
        - resample
        - reorient
        - spherical_roi
        - cuboid_roi
        - searchlight.searchlight_iterator
        - conn_comp
    - title: "Visualization"
      desc: "Plotting helpers for volumes and overlays."
      contents:
        - plot_neuro_vol
        - plot_ortho
        - plot_montage
        - plot_overlay
