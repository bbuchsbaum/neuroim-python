project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "start/*.qmd"
    - "concepts/*.qmd"
    - "cookbook/*.qmd"
    - "evidence/*.qmd"
    - "tutorials/*.qmd"
    - "!_includes/**"
    - "reference/*.qmd"
    - "spec/*.md"
    - "!_archive/**"
    - "!_plan/**"
  preview:
    port: 4200
    browser: false
  resources:
    - "reference/**"

website:
  title: "neuroim"
  description: "Python data structures and algorithms for 3D, 4D, and 5D+ neuroimaging data."
  site-url: "https://bbuchsbaum.github.io/neuroim-python/"
  repo-url: "https://github.com/bbuchsbaum/neuroim-python"
  repo-actions: [edit, issue]
  repo-branch: main
  page-navigation: true
  back-to-top-navigation: true
  bread-crumbs: false
  reader-mode: false
  search:
    location: navbar
    type: overlay
    copy-button: true
  navbar:
    pinned: true
    logo: ""
    left:
      - text: "Start"
        href: start/01-image.qmd
      - text: "Concepts"
        href: concepts/index.qmd
      - text: "Cookbook"
        href: cookbook/index.qmd
      - text: "Spec"
        href: spec/receipt-nifti-extension.html
      - text: "Evidence"
        href: evidence/index.qmd
      - text: "Reference"
        href: reference/index.qmd
    right:
      - icon: github
        href: "https://github.com/bbuchsbaum/neuroim-python"
        aria-label: GitHub
  sidebar:
    - id: start
      title: "Start"
      style: floating
      align: left
      contents:
        - start/index.qmd
        - start/01-image.qmd
        - start/02-space.qmd
        - start/03-roi.qmd
        - start/04-derived-maps.qmd
        - start/05-roundtrip.qmd
    - id: concepts
      title: "Concepts"
      style: floating
      align: left
      contents:
        - concepts/index.qmd
        - concepts/images.qmd
        - concepts/space.qmd
        - concepts/receipt.qmd
        - concepts/provenance.qmd
        - concepts/voxel-series-store.qmd
        - concepts/roi-result.qmd
        - concepts/contract-failures.qmd
        - concepts/atlas.qmd
    - id: cookbook
      title: "Cookbook"
      style: floating
      align: left
      contents:
        - cookbook/index.qmd
        - cookbook/extract-timeseries-at-coordinate.qmd
        - cookbook/parcel-timeseries-from-atlas.qmd
        - cookbook/save-derived-map-with-provenance.qmd
        - cookbook/audit-a-derived-map.qmd
        - cookbook/cross-subject-concat-with-contracts.qmd
        - cookbook/handoff-to-multiprocessing.qmd
        - cookbook/interop-with-nibabel.qmd
    - id: tutorials
      title: "Tutorials"
      style: floating
      align: left
      contents:
        - tutorials/index.qmd
        - auto: tutorials/*.qmd
    - id: reference
      title: "Reference"
      style: floating
      contents:
        - reference/index.qmd
        - auto: reference/*.qmd
  page-footer:
    border: false
    left: "Copyright 2026 Brad Buchsbaum"
    right:
      - icon: github
        href: "https://github.com/bbuchsbaum/neuroim-python"

format:
  html:
    # Single dark theme. A light/dark pair desynced the syntax-highlight
    # stylesheet from the Bootstrap bundle (both stayed enabled, the light
    # code palette won → near-black code on the dark background). The site
    # is dark-first by design, so collapse to one theme + one highlight.
    theme: [darkly, _variables.scss, _variables-dark.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "On this page"
    number-sections: false
    anchor-sections: true
    code-copy: true
    code-overflow: wrap
    code-link: true
    code-annotations: hover
    highlight-style: github-dark
    fig-align: center
    fig-cap-location: bottom
    fig-format: retina
    fig-dpi: 200
    smooth-scroll: true
    link-external-icon: false
    link-external-newwindow: true
    citations-hover: true
    footnotes-hover: true
    grid:
      sidebar-width: 260px
      body-width: 860px
      margin-width: 220px
      gutter-width: 1.5rem

execute:
  freeze: auto
  cache: true
  warning: false
  message: false

metadata-files:
  - _quartodoc.yml

# The quartodoc configuration (package, sections, concept cross-links)
# lives in _quartodoc.yml above — single source of truth. Do not
# re-declare a `quartodoc:` block here; a duplicate would shadow it.
